version: '3.8'

services:
  # === МАСТЕР БАЗА ДАННЫХ ===
  db-master:
    image: postgres:15-alpine
    container_name: db-master
    environment:
      POSTGRES_DB: otus_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: my_pass
      PGDATA: /var/lib/postgresql/data
    volumes:
      - master-data:/var/lib/postgresql/data
    # ХАК: принудительно вшиваем разрешение репликации прямо в команду старта родного entrypoint
    entrypoint: >
      /bin/sh -c "
      mkdir -p /docker-entrypoint-initdb.d;
      echo 'echo \"host replication all 0.0.0.0/0 trust\" >> \"$$PGDATA/pg_hba.conf\"' > /docker-entrypoint-initdb.d/init-replicate.sh;
      chmod +x /docker-entrypoint-initdb.d/init-replicate.sh;
      exec docker-entrypoint.sh postgres -c wal_level=replica -c max_wal_senders=10 -c hot_standby=on
      "
    ports:
      - "5432:5432"

  # === СЛЕЙВ БАЗА ДАННЫХ 1 ===
  db-slave-1:
    image: postgres:15-alpine
    container_name: db-slave-1
    environment:
      PGPASSWORD: my_pass
    depends_on:
      - db-master
    # Заставляем докер принудительно работать ПОД ЮЗЕРОМ postgres, это решает проблему root!
    user: postgres
    command: >
      /bin/sh -c "
      until pg_isready -h db-master -p 5432 -U postgres; do echo 'Waiting for master...'; sleep 2; done;
      if [ ! -s /var/lib/postgresql/data/PG_VERSION ]; then
        echo 'Cloning master database...';
        rm -rf /var/lib/postgresql/data/*;
        pg_basebackup -h db-master -D /var/lib/postgresql/data -U postgres -v -P -R -X stream;
      fi;
      echo 'Fixing invalid permissions on macOS...';
           chmod 700 /var/lib/postgresql/data;
           echo 'Starting PostgreSQL Standby...';
           exec postgres -D /var/lib/postgresql/data;
      "
    ports:
      - "5433:5432"

  # === СЛЕЙВ БАЗА ДАННЫХ 2 ===
  db-slave-2:
    image: postgres:15-alpine
    container_name: db-slave-2
    environment:
      PGPASSWORD: my_pass
    depends_on:
      - db-master
    user: postgres
    command: >
      /bin/sh -c "
      until pg_isready -h db-master -p 5432 -U postgres; do echo 'Waiting for master...'; sleep 2; done;
      if [ ! -s /var/lib/postgresql/data/PG_VERSION ]; then
        echo 'Cloning master database...';
        rm -rf /var/lib/postgresql/data/*;
        pg_basebackup -h db-master -D /var/lib/postgresql/data -U postgres -v -P -R -X stream;
      fi;
      echo 'Fixing invalid permissions on macOS...';
                chmod 700 /var/lib/postgresql/data;
                echo 'Starting PostgreSQL Standby...';
                exec postgres -D /var/lib/postgresql/data;
      "
    ports:
      - "5434:5432"

  # === МОНИТОРИНГ И КРИТЕРИИ НАГРУЗКИ ===
  influxdb:
    image: influxdb:1.8
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=k6

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_BASIC_ENABLED=false
    depends_on:
      - influxdb

volumes:
  master-data:
